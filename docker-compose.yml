version: "3.9"

services:
  vllm:
    build: .
    container_name: vllm
    runtime: nvidia
    ports:
      - "8000:8000"
    volumes:
      - $HOME/.cache/huggingface:/root/.cache/huggingface
      - ./models:/models
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True,max_split_size_mb:512
    command: >
      --model cyankiwi/Qwen3-Coder-30B-A3B-Instruct-AWQ-4bit
      --served-model-name qwen3-coder
      --dtype auto
      --tensor-parallel-size 1
      --max-model-len 40960
      --gpu-memory-utilization 0.92
      --max-num-batched-tokens 256
      --max-num-seqs 2
      --enable-auto-tool-choice
      --tool-call-parser qwen3_coder

  chroma:
    image: chromadb/chroma
    ports:
      - "8001:8000"

  embeddings:
    image: ghcr.io/huggingface/text-embeddings-inference:latest
    ports:
      - "8080:80"
    command: --model-id BAAI/bge-small-en-v1.5

  langgraph:
    image: python:3.11
    working_dir: /app
    volumes:
      - ./agents:/app/agents
      - ./tools:/app/tools
      - ./:/app
    command: bash -c "pip install langgraph langchain-core langchain-openai fastapi && python /app/agents/langgraph_orchestrator.py"
    ports:
      - "9001:9001"

  gateway:
    image: python:3.11
    working_dir: /app
    volumes:
      - ./gateway:/app
      - ./tools:/tools
      - ./agents:/agents
    command: bash -c "pip install fastapi uvicorn httpx langchain langgraph && uvicorn fastapi_router:app --host 0.0.0.0 --port 9000"
    ports:
      - "9000:9000"
    depends_on:
      - langgraph
